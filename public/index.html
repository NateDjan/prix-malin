<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prix Malin 🛒</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0F;color:#F0EDE8;font-family:system-ui,sans-serif;min-height:100vh;overflow-y:auto}
.app{max-width:520px;margin:0 auto;padding:16px;padding-bottom:80px}
h1{font-size:22px;font-weight:900;text-align:center;padding:20px 0 4px}
.sub{text-align:center;color:rgba(240,237,232,.4);font-size:12px;margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.tab-btn{flex:none;background:none;border:none;color:rgba(240,237,232,.4);cursor:pointer;padding:8px 12px;font-size:12px;border-bottom:2px solid transparent;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab-btn.active{color:#F0EDE8;border-bottom-color:#5BF5A8}
.tab-icon{font-size:22px}
.sec-tabs{display:flex;gap:8px;margin-bottom:16px}
.sec-btn{flex:1;padding:10px;border-radius:12px;border:1px solid rgba(240,237,232,.1);background:none;color:rgba(240,237,232,.5);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700}
.sec-btn.active{background:rgba(91,245,168,.15);border-color:#5BF5A8;color:#5BF5A8}
.drop-zone{border:2px dashed rgba(240,237,232,.15);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s}
.drop-zone:hover{border-color:#5BF5A8;background:rgba(91,245,168,.04)}
.ticket-info{background:rgba(91,245,168,.08);border:1px solid rgba(91,245,168,.2);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.ticket-store{font-weight:800;font-size:15px}
.ticket-meta{font-size:12px;color:rgba(240,237,232,.5);margin-top:2px}
.ticket-total{font-size:20px;font-weight:900;color:#5BF5A8}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:rgba(240,237,232,.35);margin-bottom:10px}
.stores-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.store-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;cursor:pointer;text-align:center;transition:.2s}
.store-card:hover,.store-card.sel{background:rgba(255,255,255,.1);border-color:var(--sc)}
.store-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;margin:0 auto 8px}
.store-name{font-size:13px;font-weight:700;margin-bottom:4px}
.store-price{font-size:15px;font-weight:900}
.cheap-badge{font-size:10px;background:rgba(254,200,30,.15);color:#FEC81E;border-radius:6px;padding:2px 6px;margin-bottom:6px;display:inline-block}
.ecomix{background:rgba(91,245,168,.08);border:1px solid rgba(91,245,168,.25);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;transition:.2s}
.ecomix:hover,.ecomix.sel{background:rgba(91,245,168,.15)}
.em-name{font-weight:800;font-size:15px;color:#5BF5A8}
.em-sub{font-size:12px;color:rgba(240,237,232,.5)}
.em-amt{font-size:18px;font-weight:900;color:#5BF5A8}
.em-save{font-size:11px;color:rgba(91,245,168,.7)}
.login-notice{background:rgba(91,245,168,.06);border:1px solid rgba(91,245,168,.2);border-radius:13px;padding:12px 14px;margin-bottom:10px}
.login-title{font-size:13px;font-weight:700;color:#5BF5A8;margin-bottom:4px}
.login-sub{font-size:12px;color:rgba(240,237,232,.6);line-height:1.6}
.btn-cart{width:100%;padding:14px;border-radius:14px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:16px;color:#fff}
.products{background:rgba(255,255,255,.03);border-radius:14px;padding:12px;margin-top:8px}
.product{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.product:last-child{border-bottom:none}
.p-name{font-size:13px;font-weight:600}
.p-orig{font-size:11px;color:rgba(240,237,232,.4);margin-top:2px}
.p-price{font-size:13px;font-weight:700;color:#5BF5A8;white-space:nowrap}
.status{text-align:center;padding:40px 20px}
.spin{font-size:32px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);border-radius:12px;padding:12px;margin-top:12px;font-size:13px;color:#ff9090}
.prog{position:fixed;bottom:0;left:0;right:0;background:#0A0A0F;border-top:2px solid #5BF5A8;padding:14px 20px;z-index:999}
.prog-head{font-size:13px;font-weight:800;color:#5BF5A8;margin-bottom:8px;display:flex;justify-content:space-between}
.prog-track{background:rgba(255,255,255,.08);border-radius:4px;height:6px;margin-bottom:8px}
.prog-fill{background:#5BF5A8;height:6px;border-radius:4px;transition:width .4s}
.prog-prod{font-size:12px;color:rgba(240,237,232,.5)}
.btn-x{background:none;border:1px solid rgba(240,237,232,.2);color:rgba(240,237,232,.4);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit}
</style>
</head>
<body>
<div class="app">
  <h1>Prix Malin 🛒</h1>
  <p class="sub">Compare les prix · Économise partout</p>
  <div id="root"></div>
</div>
<script>
const CATS=[{id:'food',icon:'🥦',label:'Alimentaire'},{id:'tech',icon:'💻',label:'Tech'},{id:'home',icon:'🏠',label:'Maison'},{id:'fashion',icon:'👗',label:'Mode'},{id:'sport',icon:'⚽',label:'Sport'},{id:'beauty',icon:'💄',label:'Beauté'}];
const STORES=[{id:'leclerc',name:'E.Leclerc',color:'#0052CC',letter:'E',factor:1.00},{id:'carrefour',name:'Carrefour',color:'#003DA5',letter:'C',factor:1.08},{id:'intermarche',name:'Intermarché',color:'#E31E24',letter:'I',factor:1.04},{id:'lidl',name:'Lidl',color:'#FFC61E',letter:'L',factor:0.95,cheap:true},{id:'auchan',name:'Auchan',color:'#E31E24',letter:'A',factor:1.06},{id:'monoprix',name:'Monoprix',color:'#E63946',letter:'M',factor:1.22}];
const DRIVE={leclerc:{name:'E.Leclerc Drive',url:q=>'https://fd3-courses.leclercdrive.fr/magasin-169203-169203-Rueil-Malmaison-Boulevard-National/recherche.aspx?TexteRecherche='+encodeURIComponent(q),ms:3500,note:'Connecte-toi sur fd3-courses.leclercdrive.fr (Rueil-Malmaison)'},carrefour:{name:'Carrefour',url:q=>'https://www.carrefour.fr/s?q='+encodeURIComponent(q)+'&ref=search',ms:4000,note:'Connecte-toi sur carrefour.fr avant de démarrer'},intermarche:{name:'Intermarché',url:q=>'https://www.intermarche.com/recherche?q='+encodeURIComponent(q),ms:4000,note:'Connecte-toi sur intermarche.com avant de démarrer'},auchan:{name:'Auchan',url:q=>'https://www.auchan.fr/recherche?q='+encodeURIComponent(q),ms:4000,note:'Connecte-toi sur auchan.fr avant de démarrer'},monoprix:{name:'Monoprix',url:q=>'https://www.monoprix.fr/recherche/'+encodeURIComponent(q),ms:4000,note:'Connecte-toi sur monoprix.fr avant de démarrer'},lidl:{name:'Lidl',url:q=>'https://www.lidl.fr/recherche?q='+encodeURIComponent(q),ms:4000,note:'Disponible en livraison sur lidl.fr'}};
const FP='Extrait les produits. JSON uniquement: {"products":[{"original":"","search":"","qty":1,"price":0}],"store":"","total":0,"date":""}';
const SYS='Reponds uniquement avec du JSON valide, sans markdown.';
let S={catId:'food',sec:'import',status:'idle',msg:'',results:{},store:null,cp:localStorage.getItem('prix_malin_cp')||'',realPrices:{}};
function set(p){
  Object.assign(S,p);
  render();
  // Scroller vers la liste si on vient de choisir une enseigne
  if(p.store !== undefined) {
    setTimeout(()=>{
      const el = document.querySelector('.login-notice') || document.querySelector('.products') || document.querySelector('.btn-cart');
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 50);
  }
}
let _key=null;
async function getKey(){
  if(_key)return _key;
  const r=await fetch('/api/key');
  const d=await r.json();
  _key=d.k;
  return _key;
}
async function callAI(text,isB64Pdf){
  const key=await getKey();
  let content;
  if(isB64Pdf){
    content=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:isB64Pdf}},{type:'text',text:FP}];
  }else{
    content=text+'\n\n'+FP;
  }
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:4000,system:SYS,messages:[{role:'user',content}]}),
  });
  const data=await r.json();
  if(!r.ok)throw new Error(data?.error?.message||'Erreur API '+r.status);
  const txt=data.content?.[0]?.text||'';
  const m=txt.match(/\{[\s\S]*\}/);
  if(!m)throw new Error('Pas de JSON: '+txt.slice(0,100));
  return JSON.parse(m[0]);
}
function toB64(buf){const b=new Uint8Array(buf);let s='';for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
async function analyzeText(text){
  set({status:'loading',msg:'Analyse en cours...',sec:'compare'});
  try{
    const lines = text.trim().split('\n').filter(l=>l.trim());
    let products = [], store='', total=0, date='';

    if(lines.length <= 30){
      // Petit ticket: 1 seul appel
      const res = await callAI(text, null);
      if(!res.products?.length) throw new Error('Aucun produit trouve');
      products = res.products; store = res.store; total = res.total; date = res.date;
    } else {
      // Grand ticket: couper en 2 moitiés et appels parallèles
      const mid = Math.floor(lines.length/2);
      const part1 = lines.slice(0, mid).join('\n');
      const part2 = lines.slice(mid).join('\n');
      set({msg:'Analyse partie 1/2...'});
      const [r1, r2] = await Promise.all([
        callAI(part1, null),
        callAI(part2, null)
      ]);
      products = [...(r1.products||[]), ...(r2.products||[])];
      store = r1.store || r2.store || '';
      total = r1.total || r2.total || 0;
      date = r1.date || r2.date || '';
      if(!products.length) throw new Error('Aucun produit trouve');
    }

    const results={...S.results};
    results[S.catId]={products,store,total,date};
    // Demander code postal si absent
    if(!S.cp) {
      const cp = prompt('Votre code postal (pour les prix de votre région) :','92410');
      if(cp) { S.cp = cp; localStorage.setItem('prix_malin_cp', cp); }
    }
    set({status:'done',results,msg:'',store:null,sec:'compare'});
    // Fetch vrais prix en arrière-plan
    if(S.cp) {
      fetchRealPrices(res.products, S.cp).then(rp => {
        S.realPrices = {...S.realPrices, ...rp};
        render();
      });
    }
  }catch(e){
    set({status:'error',msg:e.message,sec:'import'});
  }
}
async function analyzePdf(buf){
  set({status:'loading',msg:'Analyse du ticket...',sec:'compare'});
  try{
    const b64=toB64(buf);
    const res=await callAI(null,b64);
    if(!res.products?.length)throw new Error('Aucun produit trouve');
    const results={...S.results};results[S.catId]=res;
    set({status:'done',results,msg:'',store:null,sec:'compare'});
  }catch(e){
    set({status:'error',msg:e.message,sec:'import'});
  }
}
async function handleFile(f){
  const ext=f.name.split('.').pop().toLowerCase();
  if(ext==='pdf'){
    const buf=await f.arrayBuffer();
    await analyzePdf(buf);
  }else if(['jpg','jpeg','png','webp'].includes(ext)){
    const r=new FileReader();
    r.onload=async e=>{
      const b64=e.target.result.split(',')[1];
      set({status:'loading',msg:'Analyse en cours...',sec:'compare'});
      try{
        const key=await getKey();
        const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,system:SYS,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:f.type,data:b64}},{type:'text',text:FP}]}]})});
        const data=await resp.json();
        const txt=data.content?.[0]?.text||'';
        const m=txt.match(/\{[\s\S]*\}/);
        if(!m)throw new Error('Pas de JSON');
        const res=JSON.parse(m[0]);
        if(!res.products?.length)throw new Error('Aucun produit');
        const results={...S.results};results[S.catId]=res;
        set({status:'done',results,msg:'',store:null,sec:'compare'});
      }catch(e){set({status:'error',msg:e.message,sec:'import'});}
    };
    r.readAsDataURL(f);
  }else{
    const text=await f.text();
    await analyzeText(text);
  }
}
function onPaste(v){ /* auto-analyse désactivée - bouton uniquement */ }

async function fetchRealPrices(products, cp) {
  if(!cp || !products?.length) return {};
  const prices = {};
  // Prendre les 5 premiers produits les plus chers (les plus significatifs)
  const topProds = [...products].sort((a,b)=>((b.price||0)*(b.qty||1))-((a.price||0)*(a.qty||1))).slice(0,5);
  await Promise.all(topProds.map(async p => {
    try {
      const r = await fetch('/api/prix?q='+encodeURIComponent(p.search)+'&cp='+encodeURIComponent(cp));
      const d = await r.json();
      if(d.prices) prices[p.search] = d.prices;
    } catch(e) {}
  }));
  return prices;
}

function calcStoreTotalReal(products, storeId, realPrices) {
  let total = 0;
  let found = 0;
  products.forEach(p => {
    const storePrice = realPrices[p.search]?.[storeId];
    if(storePrice != null) { total += storePrice * (p.qty||1); found++; }
    else { total += (p.price||0) * (p.qty||1) * (STORES.find(s=>s.id===storeId)?.factor||1); }
  });
  return { total: +total.toFixed(2), realCount: found, totalCount: products.length };
}
function est(prods,sid){const s=STORES.find(x=>x.id===sid);if(!s)return 0;return +(prods.reduce((a,p)=>a+(p.price*(p.qty||1)),0)*s.factor).toFixed(2);}
function emAmt(prods){return +(prods.reduce((a,p)=>a+(p.price*(p.qty||1)),0)*Math.min(...STORES.map(s=>s.factor))).toFixed(2);}
function emSave(prods){const base=prods.reduce((a,p)=>a+(p.price*(p.qty||1)),0);return +(base*(STORES.reduce((a,s)=>a+s.factor,0)/STORES.length-Math.min(...STORES.map(s=>s.factor)))).toFixed(2);}
let _run=false;
function startCart(sid,prods){
  // Ouvrir le premier produit immédiatement (déclenché par clic utilisateur = pas bloqué)
  const cfg=DRIVE[sid];
  if(!cfg){alert('Enseigne non configurée');return;}
  
  // Stocker les produits restants et l'index courant
  window._cartProds = prods;
  window._cartSid = sid;
  window._cartIdx = 0;
  window._cartCfg = cfg;
  _run = true;
  
  prog(prods, 0, cfg.name);
  
  // Ouvrir le premier produit - synchrone, déclenché par clic = pas bloqué
  window.location.href = cfg.url(prods[0].search);
}
function prog(prods,cur,name){
  let el=document.getElementById('_prog');
  if(!el){el=document.createElement('div');el.id='_prog';el.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#0A0A0F;border-top:2px solid #5BF5A8;padding:14px 20px;z-index:999';document.body.appendChild(el);}
  if(cur>=prods.length){el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#5BF5A8;font-weight:800">✅ '+prods.length+' produits sur '+name+'</span><button onclick="document.getElementById(\'_prog\').remove()" style="background:none;border:1px solid rgba(240,237,232,.2);color:rgba(240,237,232,.4);padding:4px 10px;border-radius:8px;cursor:pointer;font-family:inherit">Fermer</button></div>';return;}
  const pct=Math.round(cur/prods.length*100);
  el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="color:#5BF5A8;font-weight:800;font-size:13px">🛒 '+cur+'/'+prods.length+' · '+name+'</span><button onclick="_run=false;document.getElementById(\'_prog\').remove()" style="background:none;border:1px solid rgba(240,237,232,.2);color:rgba(240,237,232,.4);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit">Annuler</button></div><div style="background:rgba(255,255,255,.08);border-radius:4px;height:6px;margin-bottom:8px"><div style="background:#5BF5A8;height:6px;border-radius:4px;width:'+pct+'%;transition:width .4s"></div></div><div style="font-size:12px;color:rgba(240,237,232,.5)">📦 '+prods[cur].search+'</div>';
}
function render(){
  const {catId,sec,status,msg,results,store}=S;
  const res=results[catId];
  let h='';
  h+='<div class="tabs">';
  CATS.forEach(c=>{h+='<button class="tab-btn '+(c.id===catId?'active':'')+'" onclick="set({catId:\''+c.id+'\',sec:\'import\'})"><span class="tab-icon">'+c.icon+'</span><span>'+c.label+'</span></button>';});
  h+='</div>';
  h+='<div class="sec-tabs">';
  h+='<button class="sec-btn '+(sec==='import'?'active':'')+'" onclick="set({sec:\'import\'})">📥 Importer</button>';
  h+='<button class="sec-btn '+(sec==='compare'&&res?'active':'')+'" onclick="'+(res?'set({sec:\'compare\'})':'void(0)')+'">🔍 Comparer</button>';
  h+='</div>';
  if(status==='loading'){
    h+='<div class="status"><div class="spin">⏳</div><div style="font-size:14px;font-weight:700;margin-bottom:4px">'+(msg||'Analyse...')+'</div><div style="font-size:12px;color:rgba(240,237,232,.4)">Quelques secondes...</div></div>';
  }else if(sec==='import'){
    h+='<div class="drop-zone" id="dz" onclick="document.getElementById(\'fi\').click()"><div style="font-size:36px;margin-bottom:10px">🧾</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">Importer un ticket</div><div style="font-size:12px;color:rgba(240,237,232,.4)">PDF · JPG · PNG · TXT</div></div>';
    h+='<input type="file" id="fi" accept=".pdf,.jpg,.jpeg,.png,.webp,.txt,.csv" style="display:none">';
    h+='<div style="text-align:center;color:rgba(240,237,232,.25);font-size:11px;margin:10px 0">— ou colle le texte —</div>';
    h+='<div style="display:flex;gap:8px;align-items:flex-start">' +
      '<textarea id="ta" placeholder="Colle le texte de ton ticket ici..." style="flex:1;height:90px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#F0EDE8;padding:10px;font-size:12px;font-family:monospace;resize:none;outline:none" oninput="onPaste(this.value)"></textarea>' +
      '<button onclick="const v=document.getElementById(\'ta\').value;if(v.trim().length>5){clearTimeout(_pt);analyzeText(v);}" style="background:#5BF5A8;color:#0A0A0F;border:none;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px;white-space:nowrap">⚡ Analyser</button>' +
    '</div>';
    if(msg&&status==='error')h+='<div class="err">⚠️ '+msg+'</div>';
  }else if(sec==='compare'&&res){
    const {products:prods,store:st,total,date}=res;
    const base=prods.reduce((a,p)=>a+(p.price*(p.qty||1)),0);
    h+='<div class="ticket-info"><div><div class="ticket-store">'+(st||'Ticket importé')+'</div><div class="ticket-meta">'+(date?'Le '+date+' · ':'')+prods.length+' articles</div></div><div class="ticket-total">'+( total||base).toFixed(2)+' €</div></div>';
    h+='<div class="sec-title">CHOISIR UNE ENSEIGNE</div>' +
     '<div style="font-size:11px;color:rgba(240,237,232,.3);margin-bottom:10px">💡 Prix estimés selon les tarifs moyens de chaque enseigne — les prix réels peuvent varier</div>';
    const ea=emAmt(prods),es=emSave(prods);
    h+='<div class="ecomix '+(store==='ecomix'?'sel':'')+'" onclick="set({store:\'ecomix\'})"><div style="display:flex;align-items:center;gap:12px"><div style="font-size:24px">🌿</div><div><div class="em-name">Eco-Mix</div><div class="em-sub">Chaque produit chez le moins cher</div></div></div><div style="text-align:right"><div class="em-amt">'+ea.toFixed(2)+' €</div><div class="em-save">-'+es.toFixed(2)+' € eco.</div></div></div>';
    h+='<div class="stores-grid">';
    STORES.forEach(s=>{
      const ep=est(prods,s.id);
      h+='<div class="store-card '+(store===s.id?'sel':'')+'" style="--sc:'+s.color+'" onclick="set({store:\''+s.id+'\'})">'+
        (s.cheap?'<div class="cheap-badge">LE + BAS</div>':'')+
        '<div class="store-icon" style="background:'+s.color+'22;color:'+s.color+'">'+s.letter+'</div>'+
        '<div class="store-name">'+s.name+'</div>'+
        '<div class="store-price" style="color:'+s.color+'">~'+ep.toFixed(2)+' €</div>'+
        '<div style="font-size:11px;color:rgba(240,237,232,.35);margin-top:2px">estimation</div></div>';
    });
    h+='</div>';
    if(store==='ecomix'){
      // Eco-Mix: montrer chaque produit avec l'enseigne la moins chère
      const bestStore = STORES.reduce((a,b)=>a.factor<b.factor?a:b);
      h+='<div class="login-notice"><div class="login-title">🌿 Eco-Mix — meilleurs prix</div><div class="login-sub">Connecte-toi sur chaque site avant de démarrer le panier.</div></div>';
      h+='<button class="btn-cart" style="background:linear-gradient(135deg,#5BF5A8,#00C97A);color:#0A0A0F" onclick="startCart(\''+bestStore.id+'\','+JSON.stringify(prods)+')">🛒 Démarrer le panier Eco-Mix ('+prods.length+' produits)</button>';
      h+='<div class="products">';
      prods.forEach(p=>{
        const pBest=STORES.reduce((a,b)=>a.factor<b.factor?a:b);
        h+='<div class="product"><div><div class="p-name">'+p.search+'</div><div class="p-orig" style="color:'+pBest.color+'">'+pBest.name+'</div></div><div class="p-price">'+((p.price||0)*(p.qty||1)*pBest.factor).toFixed(2)+' €</div></div>';
      });
      h+='</div>';
    } else if(store&&store!=='ecomix'){
      const s=STORES.find(x=>x.id===store);
      const cfg=DRIVE[store];
      if(cfg)h+='<div class="login-notice"><div class="login-title">🔐 Avant de démarrer</div><div class="login-sub">'+cfg.note+'</div></div><button class="btn-cart" style="background:'+s.color+'" onclick="startCart(\''+store+'\','+JSON.stringify(prods)+')">🛒 Démarrer le panier ('+prods.length+' produits)</button>';
      h+='<div class="products">';
      prods.forEach(p=>{
        const storeId = S.store && S.store!=='ecomix' ? S.store : 'leclerc';
        const rp = S.realPrices[p.search]?.[storeId];
        const priceDisplay = rp != null ? rp.toFixed(2) + ' €' : ((p.price||0)*(p.qty||1)).toFixed(2) + ' € ~';
        h+='<div class="product"><div><div class="p-name">'+p.search+'</div><div class="p-orig">'+p.original+'</div></div><div class="p-price">'+priceDisplay+'</div></div>';
      });
      h+='</div>';
    }
  }
  document.getElementById('root').innerHTML=h;
  const fi=document.getElementById('fi');
  const dz=document.getElementById('dz');
  if(fi)fi.onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};
  if(dz){dz.ondragover=e=>{e.preventDefault();dz.style.borderColor='#5BF5A8';};dz.ondragleave=()=>{dz.style.borderColor='';};dz.ondrop=e=>{e.preventDefault();dz.style.borderColor='';if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};}
}
render();
</script>
</body>
</html>
