    {name:"Leboncoin", color:"#F56B2A",icon:"♻️",url:q=>`https://www.leboncoin.fr/recherche?text=${encodeURIComponent(q)}&sort=price&order=asc`},

// ── État global ────────────────────────────────────────────────────────────────
const S={
  catId:"food", tab:"import",
  results:{},
  imgPreview:null, imgB64:null, imgMime:null,
  fileInfo:null,
  status:null, errMsg:"",
  selStore:null, selSrc:null,
};
function set(p){Object.assign(S,p);render();}

// ── Appel API via proxy ────────────────────────────────────────────────────────
const SYS="Réponds UNIQUEMENT avec du JSON valide, sans texte avant ni après, sans backticks.";
const FOOD_P=`Analyse ce ticket de caisse. Pour chaque produit donne un nom court adapté à une recherche supermarché.
JSON: {"products":[{"original":"texte ticket","search":"nom recherche","qty":1,"price":0.00}],"store":"magasin si visible","total":0.00,"date":"date si visible"}`;
function objP(c){
  const d={tech:"produit tech (marque, modèle exact)",home:"objet maison/déco (marque, modèle)",fashion:"vêtement/accessoire (marque, type, couleur)",sport:"article sport (marque, modèle)",beauty:"produit beauté (marque, nom, contenance)"};
  return `Identifie précisément ce ${d[c]||"produit"}. Donne un nom de recherche optimal pour trouver le meilleur prix.
JSON: {"products":[{"original":"description détaillée","search":"nom optimisé","qty":1,"price":0.00}],"store":"","total":0,"date":""}`;
}

function xJSON(t){
  const f=t.match(/```json\s*([\s\S]*?)```/);
  if(f){try{return JSON.parse(f[1].trim())}catch(e){}}
  const a=t.indexOf("{"),b=t.lastIndexOf("}");
  if(a!==-1&&b>a){try{return JSON.parse(t.slice(a,b+1))}catch(e){}}
  try{return JSON.parse(t.trim())}catch(e){}
  throw new Error("JSON introuvable");
}

async function callAI(messages,maxTokens=4000){
  const res=await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system:SYS,messages}),
  });
  const raw=await res.text();
  let data;
  try{data=JSON.parse(raw);}catch(e){throw new Error("Réponse proxy invalide: "+raw.slice(0,100));}
  if(!res.ok) throw new Error("Erreur "+(data?.error?.message||res.status));
  if(data.stop_reason==="max_tokens") throw new Error("MAX_TOKENS");
  const txt=data.content?.find(b=>b.type==="text")?.text||"";
  return xJSON(txt);
}

async function callWithRetry(messages){
  for(const t of [4000,8000]){
    try{return await callAI(messages,t);}
    catch(e){
      if(e.message==="MAX_TOKENS"&&t<8000)continue;
      throw e.message==="MAX_TOKENS"?new Error("Fichier trop grand — essaie en 2 photos"):e;
    }
  }
}

// ── Resize image ───────────────────────────────────────────────────────────────
async function resize(b64,mime){
  if(["image/heic","image/heif"].includes(mime))return{b64,mime};
  if(b64.length*0.75<1.5*1024*1024)return{b64,mime};
  return new Promise(ok=>{
    const img=new Image();
    img.onerror=()=>ok({b64,mime});
    img.onload=()=>{
      try{
        if(img.width<=1200&&img.height<=3600){ok({b64,mime});return;}
        const r=Math.min(1200/img.width,3600/img.height);
        const c=document.createElement("canvas");
        c.width=Math.round(img.width*r);c.height=Math.round(img.height*r);
        const ctx=c.getContext("2d");
        if(!ctx){ok({b64,mime});return;}
        ctx.drawImage(img,0,0,c.width,c.height);
        const out=c.toDataURL("image/jpeg",.85);
        ok(out&&out!=="data:,"?{b64:out.split(",")[1],mime:"image/jpeg"}:{b64,mime});
      }catch(e){ok({b64,mime});}
    };
    img.src=`data:${mime};base64,${b64}`;
  });
}

function b64buf(buf){
  const b=new Uint8Array(buf);let s="";
  for(let i=0;i<b.length;i+=8192)s+=String.fromCharCode(...b.subarray(i,i+8192));
  return btoa(s);
}

// ── Analyse ────────────────────────────────────────────────────────────────────
async function analyze(){
  if(S.status==="loading")return;
  set({status:"loading",errMsg:""});
  try{
    const catId=S.catId;
    const prompt=catId==="food"?FOOD_P:objP(catId);
    let r;
    if(S.imgB64){
      const safe=S.imgMime==="image/jpg"?"image/jpeg":S.imgMime||"image/jpeg";
      const {b64,mime}=await resize(S.imgB64,safe);
      r=await callWithRetry([{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mime,data:b64}},
        {type:"text",text:prompt}
      ]}]);
    }else if(S.fileInfo?.type==="pdf"){
      r=await callWithRetry([{role:"user",content:[
        {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64buf(S.fileInfo.data)}},
        {type:"text",text:prompt}
      ]}]);
    }else if(S.fileInfo?.type==="text"){
      r=await callWithRetry([{role:"user",content:S.fileInfo.data.slice(0,4000)+"\n\n"+prompt}]);
    }else{
      throw new Error("Aucun fichier chargé");
    }
    if(!r?.products?.length)throw new Error("Aucun produit détecté — réessaie avec une photo plus nette");
    S.results[catId]={products:r.products,meta:{store:r.store,total:r.total,date:r.date}};
    set({status:"done",tab:"compare"});
  }catch(e){
    set({status:"error",errMsg:e.message||"Erreur inconnue"});
  }
}

// ── Chargement fichiers ────────────────────────────────────────────────────────
function loadImg(f){
  if(!f||!f.type.startsWith("image/"))return;
  const r=new FileReader();
  r.onload=e=>{
    S.imgPreview=e.target.result;S.imgB64=e.target.result.split(",")[1];
    S.imgMime=f.type;S.fileInfo=null;S.status=null;S.errMsg="";
    render();
    if(S.catId!=="food")analyze(); // auto pour objets
  };
  r.readAsDataURL(f);
}

function loadFile(f){
  if(!f)return;
  const ext=f.name.split(".").pop().toLowerCase();
  const tm={pdf:"pdf",jpg:"image",jpeg:"image",png:"image",webp:"image",heic:"image",txt:"text",csv:"text"};
  const type=tm[ext];
  if(!type){set({status:"error",errMsg:`.${ext} non supporté`});return;}
  S.status=null;S.errMsg="";
  const r=new FileReader();
  if(type==="image"){
    r.onload=e=>{S.imgPreview=e.target.result;S.imgB64=e.target.result.split(",")[1];S.imgMime=f.type;S.fileInfo=null;render();};
    r.readAsDataURL(f);
  }else if(type==="pdf"){
    r.onload=e=>{S.imgPreview=null;S.imgB64=null;S.fileInfo={name:f.name,size:f.size,type:"pdf",data:e.target.result};render();};
    r.readAsArrayBuffer(f);
  }else{
    r.onload=e=>{S.imgPreview=null;S.imgB64=null;S.fileInfo={name:f.name,size:f.size,type:"text",data:e.target.result};render();};
    r.readAsText(f,"UTF-8");
  }
}

function clearFile(){Object.assign(S,{imgPreview:null,imgB64:null,imgMime:null,fileInfo:null,status:null,errMsg:""});render();}
function fmtSz(b){return b<1<<20?`${(b/1024).toFixed(1)} Ko`:`${(b/1024/1024).toFixed(1)} Mo`}

// ── Rendu ──────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("catNav").innerHTML=CATS.map(c=>
    `<button class="cat-btn${S.catId===c.id?" active":""}" style="--cc:${c.color}" onclick="swCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span><span class="cat-label">${c.label}</span>
    </button>`).join("");

  const cc=CATS.find(c=>c.id===S.catId).color;
  document.getElementById("subTabs").innerHTML=
    [{id:"import",l:"📥 Importer"},{id:"compare",l:"🔍 Comparer"}].map(t=>
    `<button class="sub-tab${S.tab===t.id?" active":""}"
      style="${S.tab===t.id?`background:${cc};border-color:${cc};`:""}"
      onclick="swTab('${t.id}')">${t.l}</button>`).join("");

  const el=document.getElementById("content");
  if(S.tab==="import")       el.innerHTML=renderImport();
  else if(S.catId==="food")  el.innerHTML=renderFood();
  else                       el.innerHTML=renderGeneric();
  bindDZ();
}

function renderImport(){
  const cat=CATS.find(c=>c.id===S.catId);
  const isFood=cat.id==="food";
  const hasData=!!(S.imgB64||S.fileInfo);
  let h="";

  if(!isFood)h+=`<div class="hint" style="background:${cat.color}12;border:1px solid ${cat.color}30;color:rgba(240,237,232,.7)">
    📸 Prends une photo de l'objet → Claude l'identifie → meilleur prix en ligne</div>`;

  if(!hasData){
    h+=`<div class="dropzone" id="dz">
      <div class="dz-icon">${isFood?"🧾":"📸"}</div>
      <div class="dz-title">${isFood?"Importer un ticket":"Photographier l'objet"}</div>
      <div class="dz-sub">${isFood?"PDF · JPG · PNG · TXT · CSV":"Appuie pour ouvrir l'appareil photo"}</div>
    </div>
    <input type="file" id="fi" accept="${isFood?".pdf,.jpg,.jpeg,.png,.webp,.heic,.txt,.csv,image/*":"image/*"}" ${isFood?"":"capture='environment'"} style="display:none">`;
  }else{
    if(S.imgPreview)h+=`<img src="${S.imgPreview}" class="img-prev">`;
    if(S.fileInfo&&!S.imgPreview)h+=`<div class="file-box">
      <span style="font-size:24px">${S.fileInfo.type==="pdf"?"📄":"📋"}</span>
      <div style="flex:1;min-width:0"><div class="file-name">${S.fileInfo.name}</div><div class="file-size">${fmtSz(S.fileInfo.size)}</div></div>
      <button class="btn-ghost" onclick="clearFile()">✕</button></div>`;

    if(isFood){
      h+=`<div class="row-btns">
        <button class="btn" style="flex:1;background:${cat.color}" onclick="analyze()" ${S.status==="loading"?"disabled":""}>
          ${S.status==="loading"?`<span class="spinner"></span> Analyse en cours…`:"🔍 Analyser le ticket"}
        </button>
        ${S.imgPreview?`<button class="btn-ghost" onclick="clearFile()">✕</button>`:""}
      </div>`;
    }else{
      h+=S.status==="loading"
        ?`<div class="st st-load"><span class="spinner"></span> Identification en cours…</div>`
        :`<button class="btn-ghost" style="width:100%;margin-bottom:8px" onclick="clearFile()">✕ Nouvelle photo</button>`;
    }
  }

  if(S.status==="error")h+=`<div class="st st-err">⚠️ ${S.errMsg}</div>`;
  if(S.status==="done") h+=`<div class="st st-ok">✅ ${isFood?"Ticket analysé":"Objet identifié"} — voir l'onglet Comparer →</div>`;
  return h;
}

function renderFood(){
  const d=S.results.food||{products:[],meta:null};
  if(!d.products.length)return`<div class="empty">🧾<br><br><span style="color:rgba(240,237,232,.5)">Aucun ticket importé</span><br><br><span style="font-size:11px">Importe ton ticket dans l'onglet Importer</span></div>`;
  const{meta,products}=d;
  const total=meta?.total>0?Number(meta.total):0;
  const sel=S.selStore;
  const active=sel==="ecomix"?ECOMIX:STORES.find(s=>s.id===sel);
  const minIdx=Math.min(...Object.values(PIDX));
  let h="";

  if(meta)h+=`<div class="receipt-box">
    <div><div class="receipt-store">${meta.store||"Ticket scanné"}</div>
    <div class="receipt-sub">${meta.date?`Le ${meta.date} · `:""}${products.length} article${products.length>1?"s":""}</div></div>
    ${total>0?`<div class="receipt-total">${total.toFixed(2)} €</div>`:""}
  </div>`;

  h+=`<div class="sec">Choisir une enseigne</div>`;
  const eco=total>0?(total*0.88).toFixed(2):null;
  const sav=total>0?(total*0.12).toFixed(2):null;
  h+=`<div class="ecomix-card${sel==="ecomix"?" active":""}" onclick="swStore('ecomix')">
    <div class="ecomix-icon">🌿</div>
    <div style="flex:1"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#5BF5A8;margin-bottom:2px">Eco-Mix</div>
    <div style="font-size:11px;color:rgba(240,237,232,.5)">Chaque produit dans l'enseigne la moins chère</div></div>
    ${eco?`<div style="text-align:right;flex-shrink:0">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#5BF5A8">${eco} €</div>
      <div style="font-size:9px;color:rgba(91,245,168,.6)">−${sav} € économisés</div>
    </div>`:""}
  </div>
  <div class="stores-grid">`;
  STORES.forEach(s=>{
    const est=total>0?(total*PIDX[s.id]).toFixed(2):null;
    h+=`<div class="store-card" style="border-color:${sel===s.id?s.color:"rgba(255,255,255,.07)"};background:${sel===s.id?s.color+"18":"rgba(255,255,255,.02)"}" onclick="swStore('${s.id}')">
      ${PIDX[s.id]===minIdx?`<div class="cheap-badge">LE - CHER</div>`:""}
      <img src="${s.logo}" class="store-logo" alt="${s.name}">
      <div class="store-name">${s.name}</div>
      ${est?`<div class="store-est" style="color:${s.color}">~${est} €</div><div class="store-sublbl">estimation</div>`:""}
    </div>`;
  });
  h+=`</div>`;

  if(active){
    h+=`<div class="link-hdr" style="background:${active.color}18;border:1px solid ${active.color}35">
      <div style="width:32px;height:32px;border-radius:8px;background:${active.color};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${active.id==="ecomix"?"🌿":active.name[0]}</div>
      <div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:${active.color}">${active.name}</div>
      <div style="font-size:11px;color:rgba(240,237,232,.4)">Prix en temps réel sur Quiestlemoinscher.com</div></div>
    </div><div class="prod-list">`;
    products.forEach((p,i)=>{
      h+=`<a class="prod-link fu" href="${active.qlmc(p.search)}" target="_blank" style="animation-delay:${i*.03}s">
        <div class="prod-thumb" id="pt${i}">🛒</div>
        <div class="prod-name"><div>${p.search}</div>${p.original&&p.original!==p.search?`<div class="prod-orig">${p.original}</div>`:""}</div>
        ${p.price>0?`<div class="prod-price">${Number(p.price).toFixed(2)} €</div>`:""}
        <span style="font-size:11px;color:rgba(240,237,232,.3)">→</span>
      </a>`;
    });
    h+=`</div>`;
    const _driveCfg = DRIVE_CONFIG[active.id];
    h+=`<div style="background:rgba(91,245,168,.06);border:1px solid rgba(91,245,168,.2);border-radius:13px;padding:12px 14px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:#5BF5A8;margin-bottom:6px">🔐 Avant de démarrer</div>
      <div style="font-size:12px;color:rgba(240,237,232,.65);line-height:1.7">${_driveCfg ? _driveCfg.note : "Connecte-toi sur le site de l'enseigne dans ton navigateur"}</div>
    </div>
    <button class="btn-panier" style="background:${active.color};color:#0A0A0F" onclick="startAutoCart(${JSON.stringify(active)},${JSON.stringify(products)})">
      🛒 Démarrer le panier automatique (${products.length} produits)
    </button>`;
    setTimeout(()=>products.forEach((p,i)=>{
      const el=document.getElementById("pt"+i);if(!el)return;
      fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(p.search.split(" ").slice(0,3).join(" "))}&search_simple=1&action=process&json=1&page_size=1&fields=image_small_url`)
        .then(r=>r.json()).then(d=>{const img=d?.products?.[0]?.image_small_url;if(img&&el)el.innerHTML=`<img src="${img}" style="width:36px;height:36px;border-radius:8px;object-fit:cover" onerror="this.parentNode.innerHTML='🛒'">`;}).catch(()=>{});
    }),100);
  }else{
    h+=`<div class="hint" style="background:rgba(91,245,168,.04);border:1px solid rgba(91,245,168,.12)">👆 Sélectionne Eco-Mix ou une enseigne pour comparer les prix</div>`;
  }
  return h;
}

function renderGeneric(){
  const cat=CATS.find(c=>c.id===S.catId);
  const d=S.results[cat.id]||{products:[],meta:null};
  if(!d.products.length)return`<div class="empty">📸<br><br><span style="color:rgba(240,237,232,.5)">Aucun objet identifié</span><br><br><span style="font-size:11px">Prends une photo dans l'onglet Importer</span></div>`;
  const{products}=d;
  const srcs=SOURCES[cat.id]||[];
  const sel=S.selSrc;
  const active=srcs.find(s=>s.name===sel);
  let h=`<div style="padding:12px 13px;border-radius:13px;background:${cat.color}10;border:1px solid ${cat.color}25;margin-bottom:14px">
    <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:${cat.color};margin-bottom:6px">${products.length} produit${products.length>1?"s":""} identifié${products.length>1?"s":""}</div>`;
  products.forEach(p=>{h+=`<div style="font-size:12px;color:rgba(240,237,232,.7);margin-top:3px"><span style="opacity:.4;margin-right:6px">•</span>${p.search}</div>`;});
  h+=`</div><div class="sec">Trouver le meilleur prix</div><div class="src-grid">`;
  srcs.forEach(s=>{
    h+=`<div class="src-card" style="border-color:${sel===s.name?s.color:"rgba(255,255,255,.07)"};background:${sel===s.name?s.color+"18":"rgba(255,255,255,.02)"}" onclick="swSrc('${s.name}')">
      <div class="src-icon">${s.icon}</div><div class="src-name">${s.name}</div>
    </div>`;
  });
  h+=`</div>`;
  if(active){
    h+=`<div class="link-hdr" style="background:${active.color}18;border:1px solid ${active.color}35">
      <span style="font-size:20px">${active.icon}</span>
      <div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:${active.color}">${active.name}</div>
      <div style="font-size:11px;color:rgba(240,237,232,.4)">Trié par prix croissant</div></div>
    </div><div class="prod-list">`;
    products.forEach((p,i)=>{
      h+=`<a class="prod-link fu" href="${active.url(p.search)}" target="_blank" style="animation-delay:${i*.03}s">
        <div class="prod-thumb">${active.icon}</div>
        <div class="prod-name"><div>${p.search}</div>${p.original&&p.original!==p.search?`<div class="prod-orig">${p.original}</div>`:""}</div>
        <span style="font-size:11px;color:rgba(240,237,232,.3)">→</span>
      </a>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="hint" style="background:${cat.color}06;border:1px solid ${cat.color}18">👆 Sélectionne un site pour voir les liens</div>`;
  }
  return h;
}

function bindDZ(){
  const dz=document.getElementById("dz");
  const fi=document.getElementById("fi");
  if(!dz||!fi)return;
  const isFood=S.catId==="food";
  dz.onclick=()=>fi.click();
  dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
  dz.ondragleave=()=>dz.classList.remove("drag");
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");const f=e.dataTransfer.files[0];isFood?loadFile(f):loadImg(f);};
  fi.onchange=e=>{const f=e.target.files[0];isFood?loadFile(f):loadImg(f);fi.value="";};
}

window.swCat  =id=>{S.catId=id;S.tab="import";S.selStore=null;S.selSrc=null;S.status=null;S.errMsg="";render();};
window.swTab  =id=>{S.tab=id;render();};
window.swStore=id=>{S.selStore=S.selStore===id?null:id;render();};
window.swSrc  =n =>{S.selSrc=S.selSrc===n?null:n;render();};
window.clearFile=clearFile;
window.analyze=analyze;

render();
</script>
</body>
</html>
