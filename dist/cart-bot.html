<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<div id="s" style="font-family:system-ui;padding:20px;background:#0A0A0F;color:#5BF5A8;font-size:14px">
  <div>🤖 Bot Prix Malin</div>
  <div id="m">Démarrage...</div>
</div>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var key = params.get('key');
  if (!key) { document.getElementById('m').textContent = 'Erreur: pas de clé'; return; }

  var info;
  try { info = JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) {}
  if (!info || !info.url) { document.getElementById('m').textContent = 'Erreur: pas de données'; return; }

  document.getElementById('m').textContent = 'Chargement: ' + info.url.split('TexteRecherche=')[1];

  // Naviguer vers Leclerc Drive
  window.location.href = info.url;
})();
</script>
</body>
</html>
